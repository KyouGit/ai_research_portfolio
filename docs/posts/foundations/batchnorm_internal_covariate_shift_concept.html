<h2>주제: BatchNorm (정규화와 학습 안정화)</h2>
<p><strong>분류:</strong> foundations</p><p><strong>타입:</strong> concept</p><p><strong>난이도:</strong> 중급</p>
<p>BatchNorm은 미니배치 통계로 activation을 정규화합니다.</p>
<p><code>\hat{x}=\frac{x-\mu_B}{\sqrt{\sigma_B^2+\epsilon}},\quad y=\gamma\hat{x}+\beta</code></p>
<h3>효과</h3><ul><li>학습 안정성 개선</li><li>더 큰 learning rate 허용</li></ul>
<h3>주의점</h3><ul><li>train/eval 모드 동작 차이</li><li>작은 배치에서 통계량 불안정</li></ul>
