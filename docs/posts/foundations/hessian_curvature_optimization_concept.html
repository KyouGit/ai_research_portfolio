<h2>주제: Hessian / Curvature (최적화 지형 이해)</h2>
<p><strong>분류:</strong> foundations</p><p><strong>타입:</strong> concept</p><p><strong>난이도:</strong> 중상</p>
<p>Hessian은 손실 함수의 곡률(2차 미분) 정보를 담습니다.</p>
<p><code>H = \nabla^2 L(\theta)</code></p>
<h3>직관</h3><ul><li>큰 고유값: 가파른 방향</li><li>작은 고유값: 평평한 방향</li></ul>
<h3>왜 중요한가</h3><ul><li>학습률 안정 구간 판단</li><li>Sharp/Flat minima 해석</li></ul>
