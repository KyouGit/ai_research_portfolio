<h2>[YOLO] 개념 설명</h2>
<p>YOLO는 실시간 객체탐지를 위해 박스 회귀와 분류를 한 번에 수행하는 대표 모델입니다.</p>

<h3>1단. 문제 정의</h3><p>해당 분야의 핵심 문제를 해결하기 위한 모델입니다.</p>
<h3>2단. 기존 한계</h3><p>이전 접근의 속도/품질/확장성 한계를 개선합니다.</p>
<h3>3단. 핵심 아이디어</h3><p>모델 구조와 학습 목적을 바꿔 성능을 개선합니다.</p>
<h3>4단. 비용/리스크</h3><p>연산 비용과 데이터 품질 의존성 관리가 필요합니다.</p>
<h3>5단. 실무 적용</h3><p>태스크와 latency 예산에 맞춰 도입 판단을 해야 합니다.</p>
