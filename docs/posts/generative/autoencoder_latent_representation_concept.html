<h2>주제: Autoencoder (잠재표현 학습)</h2>
<p><strong>분류:</strong> generative</p><p><strong>타입:</strong> concept</p><p><strong>난이도:</strong> 중급</p>
<p>Autoencoder는 입력을 압축했다가 복원하며 표현을 학습합니다.</p>
<p><code>z = f_\phi(x),\quad \hat{x}=g_\theta(z)</code></p>
<p><code>L=\|x-\hat{x}\|^2</code></p>
<h3>핵심</h3><ul><li>Encoder/Decoder 구조</li><li>Bottleneck을 통한 정보 압축</li></ul>
