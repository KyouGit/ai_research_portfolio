<h2>주제: Transformer FFN 구조</h2>
<p><strong>분류:</strong> llm</p><p><strong>타입:</strong> concept</p><p><strong>난이도:</strong> 중급</p>
<p>FFN은 각 토큰에 독립적으로 적용되는 비선형 변환 블록입니다.</p>
<p><code>FFN(x)=W_2\,\sigma(W_1x+b_1)+b_2</code></p>
<h3>역할</h3><ul><li>표현력 확장(차원 확장 후 축소)</li><li>Attention이 모은 정보의 재조합</li></ul>
<h3>확장</h3><ul><li>GELU, SwiGLU 등 활성함수 변형</li><li>MoE FFN으로 용량 확장</li></ul>
