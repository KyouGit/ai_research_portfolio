<h2>주제: Vector Search (FAISS / HNSW 기본)</h2>
<p><strong>분류:</strong> rag_agent</p><p><strong>타입:</strong> concept</p><p><strong>난이도:</strong> 중급</p>
<p>Vector search는 임베딩 유사도로 관련 문서를 찾습니다.</p>
<p><code>sim(q,d)=\frac{q\cdot d}{\|q\|\|d\|}</code></p>
<h3>핵심</h3><ul><li>Exact search vs ANN</li><li>FAISS(IVF/PQ), HNSW 그래프 탐색</li></ul>
<h3>트레이드오프</h3><ul><li>Recall ↑ ↔ Latency ↑</li><li>메모리/정확도/속도 균형</li></ul>
